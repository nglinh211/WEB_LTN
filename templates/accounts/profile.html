{% extends "base.html" %}
{% block title %}Hồ sơ | L.T.N Clothing{% endblock %}
{% block content %}
<main class="container section customer-shell">
  <aside class="account-menu">
    <strong>{{ user.username }}</strong>
    <a href="{% url 'accounts:profile' %}">Hồ sơ</a>
    <a href="{% url 'accounts:orders' %}">Đơn hàng</a>
    <a href="{% url 'shop:cart' %}">Giỏ hàng</a>
    <form class="account-logout-form" method="post" action="{% url 'accounts:logout' %}">
      {% csrf_token %}
      <button type="submit">Đăng xuất</button>
    </form>
  </aside>
  <section>
    <div class="page-head"><div><p class="eyebrow">Tài khoản</p><h1>Hồ sơ cá nhân</h1></div></div>
    <form class="card form-grid" method="post" enctype="multipart/form-data">{% csrf_token %}{{ form.as_p }}<button>Lưu thông tin</button></form>
  </section>
</main>
{% endblock %}
